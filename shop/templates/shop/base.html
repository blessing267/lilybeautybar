{% load static %}
{% load tailwind_tags %}

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Lily Beauty Bar{% endblock %}</title>

{% tailwind_css %}

</head>

<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Floating WhatsApp Button -->
  <a
    href="https://wa.me/2349012180451"
    target="_blank"
    rel="noopener noreferrer"
    class="fixed bottom-6 right-6 z-50 hover:scale-110 transition-transform duration-300"
  >
    <img
      src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg"
      alt="WhatsApp"
      class="w-14 h-14 rounded-full shadow-xl animate-pulse"
    >
  </a>

  <!-- Navbar -->
  {% include "shop/includes/navbar.html" %}

  <!-- Main Content -->
  <main class="min-h-screen">
    {% block content %}
    {% endblock %}
  </main>

  <!-- Footer -->
  {% include "shop/includes/footer.html" %}

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</body>
</html>
