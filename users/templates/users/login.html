{% extends 'shop/base.html' %}
{% block title %}Login • Lily Beauty Bar{% endblock %}

{% block content %}

<section class="min-h-screen bg-gradient-to-b from-pink-50 via-white to-pink-100 flex items-center justify-center px-6 py-20">

    <div class="w-full max-w-md">

        <!-- Card -->
        <div class="bg-white/90 backdrop-blur-lg shadow-2xl rounded-[35px] p-10 border border-pink-100">

            <!-- Header -->
            <div class="text-center">

                <div class="w-20 h-20 mx-auto bg-pink-100 rounded-full flex items-center justify-center text-4xl shadow-md">
                    💕
                </div>

                <h1 class="mt-5 text-4xl font-bold text-gray-900">
                    Welcome Back
                </h1>

                <p class="mt-2 text-gray-500">
                    Access your orders, checkout faster, and continue your beauty journey with
                    <span class="font-semibold text-pink-500">
                        Lily Beauty Bar
                    </span>
                </p>

            </div>

            <!-- Form -->
            <form method="POST" class="mt-10 space-y-5">

                {% csrf_token %}

                <input
                    type="hidden"
                    name="next"
                    value="{{ request.GET.next }}"
                >

                <!-- Username -->
                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Username
                    </label>

                    <input
                        type="text"
                        name="username"
                        placeholder="Enter username"
                        required
                        class="w-full rounded-2xl border border-pink-200 bg-pink-50 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-pink-400"
                    >

                </div>

                <!-- Password -->
                <div>

                    <label class="block mb-2 text-sm font-medium text-gray-700">
                        Password
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Enter password"
                        required
                        class="w-full rounded-2xl border border-pink-200 bg-pink-50 px-5 py-4 focus:outline-none focus:ring-2 focus:ring-pink-400"
                    >

                </div>

                <!-- Button -->
                <button
                    type="submit"
                    class="w-full py-4 rounded-2xl bg-pink-500 hover:bg-pink-600 text-white font-semibold text-lg shadow-lg transition duration-300"
                >
                    Login
                </button>

            </form>

            <!-- Register -->
            <div class="text-center mt-6">

                <p class="text-gray-500">
                    Don’t have an account?
                </p>

                <a
                    href="{% url 'register' %}"
                    class="font-semibold text-pink-500 hover:text-pink-600"
                >
                    Create Account
                </a>

            </div>

        </div>

    </div>

</section>

{% endblock %}
